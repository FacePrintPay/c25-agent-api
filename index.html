<style>
:root{--bg:#050713;--ink:#f5f8ff;--muted:#a9b6d3;--line:#26324d;--panel:#10172a;--panel2:#151f37;--gold:#ffd166;--cyan:#54d8ff;--pink:#ff5ca8;--green:#5cff9a;--bad:#ff7878;--shadow:0 28px 90px rgba(0,0,0,.38)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 18% 0,rgba(84,216,255,.22),transparent 32%),radial-gradient(circle at 84% 8%,rgba(255,209,102,.18),transparent 27%),linear-gradient(180deg,#050713,#080b19 40%,#050713);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial}a{color:inherit;text-decoration:none}.wrap{width:min(1220px,calc(100% - 32px));margin:auto}.nav{position:sticky;top:0;z-index:20;background:rgba(5,7,19,.84);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.navin{display:flex;align-items:center;justify-content:space-between;padding:14px 0}.brand{display:flex;align-items:center;gap:12px;font-weight:1000}.mark{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--cyan));color:#06101c;display:grid;place-items:center;box-shadow:0 0 34px rgba(84,216,255,.25)}.links{display:flex;gap:8px;flex-wrap:wrap}.btn,.links a,button{border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--ink);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.btn:hover,.links a:hover,button:hover{border-color:var(--cyan)}.primary{background:linear-gradient(135deg,var(--gold),#ff9944);color:#111827;border:0}.hero{padding:72px 0 36px}.kicker{color:var(--cyan);font-size:12px;letter-spacing:.17em;text-transform:uppercase;font-weight:1000}.hero h1{font-size:clamp(44px,8vw,92px);line-height:.9;margin:14px 0 18px;max-width:980px}.lead{color:var(--muted);font-size:clamp(18px,2.3vw,24px);line-height:1.55;max-width:920px}.cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{grid-column:span 4;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.wide{grid-column:span 8}.full{grid-column:1/-1}.card h3{margin:10px 0 8px}.muted{color:var(--muted);line-height:1.55}.pill{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:13px}.icon{font-size:36px}.section{padding:38px 0}.section h2{font-size:clamp(30px,4vw,48px);margin:0 0 12px}.terminal{background:#030711;border:1px solid #1c2842;border-radius:20px;padding:18px;color:#b6ffc8;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;min-height:190px}.field{display:flex;flex-direction:column;gap:8px;margin:12px 0}.field input,.field select,.field textarea{background:#080e1c;border:1px solid var(--line);border-radius:14px;color:var(--ink);padding:13px 14px;font:inherit}.table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:18px}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left}.table th{color:var(--cyan)}.status{color:var(--green)}.footer{border-top:1px solid var(--line);margin-top:54px;padding:34px 0;color:var(--muted)}@media(max-width:880px){.card,.wide{grid-column:1/-1}.links{display:none}.hero{padding-top:44px}}
</style>

<body>
<nav class="nav"><div class="wrap navin"><a class="brand" href="#home"><span class="mark">C25</span><span>Artifact OS</span></a><div class="links"><a href="#modules">Modules</a><a href="#artifacts">Artifacts</a><a href="#package">Package</a><a href="#dashboard">Dashboard</a><a href="#investors">Investors</a><a class="primary" href="#signup">Sign Up</a></div></div></nav>
<main id="app"></main>
<footer class="footer"><div class="wrap"><strong>AIKre8tive / Constellation25</strong><p>End-user compilation for the C25 artifact stack: local-first dashboard, artifact map, module pages, Termux run path, GitHub Pages publish path, and investor-ready footer.</p></div></footer>
<script>
const modules=[
{id:'constellation25',icon:'🌌',name:'Constellation25',port:3000,tag:'Core OS',desc:'Master launcher and public dashboard for the complete product constellation.',subs:['Swarm Console','Repo Health','Publishing Center','Package Builder']},
{id:'videocourts',icon:'⚖️',name:'VideoCourts',port:8002,tag:'Justice Tech',desc:'Remote court workflow for intake, evidence, hearings, schedules, and prep.',subs:['Case Intake','Evidence Vault','Hearing Room','Court Calendar']},
{id:'mybuyo',icon:'🛒',name:'MyBUYo',port:8003,tag:'Commerce',desc:'Consumer commerce and personal buying assistant tied to MyBuyo investment materials.',subs:['Shopping Agent','Price Watch','Vendor Compare','Checkout Coach']},
{id:'commz',icon:'💬',name:'Commz',port:8004,tag:'Messaging',desc:'Communications layer for announcements, CRM, team rooms, and customer contact.',subs:['Inbox','Broadcasts','Team Rooms','Customer CRM']},
{id:'parasol',icon:'☂️',name:'Parasol',port:8005,tag:'Protection',desc:'Digital umbrella for privacy, recovery, identity safety, and trust workflows.',subs:['Privacy Check','Recovery Kit','Risk Alerts','Trust Center']},
{id:'arcai',icon:'🧠',name:'ArcAI',port:8006,tag:'AI Studio',desc:'Prompt, model, agent, and workflow laboratory for building AI-assisted products.',subs:['Prompt Lab','Model Router','Workflow Builder','Evaluation Room']},
{id:'agentik',icon:'🤖',name:'Agentik',port:8007,tag:'Agents',desc:'Self-organizing agent orchestration layer for tasks, tools, handoffs, and logs.',subs:['Agent Registry','Task Board','Tool Bridge','Run Logs']},
{id:'sovereigngtp',icon:'🛡️',name:'SovereignGTP',port:8008,tag:'Sovereign AI',desc:'Private AI workspace focused on owner-controlled memory, policy, and exports.',subs:['Private Chat','Memory Ledger','Policy Controls','Export Center']},
{id:'faceprintpay',icon:'🙂',name:'FacePrintPay',port:8009,tag:'Payments',desc:'Biometric payment concept, merchant demo flow, and pilot packet.',subs:['Enrollment','Merchant Demo','Checkout Flow','Pilot Packet']},
{id:'totalrecall',icon:'📚',name:'TotalRecall',port:8010,tag:'Memory',desc:'Memory system for documents, decisions, timelines, recall, and source tracking.',subs:['Timeline','Knowledge Base','Memo Builder','Search']},
{id:'yesquidpro',icon:'🦑',name:'YesQuidPro',port:8011,tag:'Deals',desc:'Proposal, negotiation, deal memo, and close-plan workspace.',subs:['Deal Desk','Proposal Maker','Negotiation Notes','Close Plan']}
];
const artifacts = [{"title": "Capital Raise Partnership Proposal", "status": "private", "edited": "last week", "category": "capital"}, {"title": "Investor One-Pager - MyBuyo/FacePrintPay", "status": "private", "edited": "last week", "category": "investor"}, {"title": "Capital Partner 30-Day Playbook", "status": "private", "edited": "last week", "category": "capital"}, {"title": "Capital Partner Outreach Strategy", "status": "private", "edited": "last week", "category": "capital"}, {"title": "OpenSea Criteria Offer - Python", "status": "published/private", "edited": "last week", "category": "code"}, {"title": "MyBuyo Investment One-Pager", "status": "private", "edited": "last week", "category": "investor"}, {"title": "Find Recent Bash Files - Termux", "status": "private", "edited": "last week", "category": "termux"}, {"title": "WideOpen-Obsidian Repository Analyzer", "status": "private", "edited": "last week", "category": "analysis"}, {"title": "Find All Code Files - 144k Search", "status": "private", "edited": "last week", "category": "analysis"}, {"title": "Investor Tracking Spreadsheet Template", "status": "private", "edited": "last week", "category": "investor"}, {"title": "Beautiful Soup Lead Scraper - Capital Raising", "status": "private", "edited": "last week", "category": "capital"}, {"title": "OpenSea Criteria Offer Builder", "status": "private", "edited": "last week", "category": "code"}, {"title": "Capital Partner Agreement - Template", "status": "private", "edited": "last week", "category": "legal"}, {"title": "Advanced Lead Scraper - LinkedIn + More", "status": "private", "edited": "last week", "category": "capital"}, {"title": "mybuyo_fullstack.html", "status": "published/private", "edited": "2 months ago", "category": "product"}, {"title": "resonant-void-om.html", "status": "published/private", "edited": "2 months ago", "category": "product"}, {"title": "The Automated Path - Let Your Agents Work", "status": "published/private", "edited": "3 months ago", "category": "agents"}, {"title": "HYPERDRIVE MODE - 48 Hour Blitz", "status": "private", "edited": "3 months ago", "category": "execution"}, {"title": "Data Pipeline Manager Simulation", "status": "private", "edited": "3 months ago", "category": "data"}, {"title": "Constellation 25 — Full Sovereign Stack + Pathos GenAI Engine", "status": "private", "edited": "3 months ago", "category": "platform"}, {"title": "AI Metaverse Planetary Assistant Deployment System", "status": "private", "edited": "3 months ago", "category": "platform"}, {"title": "Clear Path to Success - 90 Day Plan", "status": "private", "edited": "3 months ago", "category": "execution"}, {"title": "Vercel Deployment Comprehensive Analysis", "status": "private", "edited": "3 months ago", "category": "deployment"}, {"title": "GCP Roles & Permissions Interface", "status": "private", "edited": "3 months ago", "category": "cloud"}, {"title": "Sovereign AI Universe - Master Dashboard", "status": "private", "edited": "3 months ago", "category": "platform"}, {"title": "Anthropic × KRE8TIVE HOLDINGS Partnership Proposal", "status": "private", "edited": "3 months ago", "category": "partnership"}, {"title": "100K Telegram Followers Growth Strategy", "status": "private", "edited": "3 months ago", "category": "growth"}, {"title": "Agentik Orchestrator - Self-Organizing Agents", "status": "private", "edited": "3 months ago", "category": "agents"}, {"title": "c25-complete.html", "status": "published/private", "edited": "3 months ago", "category": "product"}, {"title": "ARTie AI Gadgets Store", "status": "published/private", "edited": "3 months ago", "category": "commerce"}];
const $=s=>document.querySelector(s);const route=()=>location.hash.slice(1)||'home';
function moduleCard(m){return `<a class="card" href="#module/${m.id}"><span class="pill">${m.tag} · :${m.port}</span><div class="icon">${m.icon}</div><h3>${m.name}</h3><p class="muted">${m.desc}</p></a>`}
function home(){return `<section class="hero wrap"><div class="kicker">Artifact-to-package compilation</div><h1>This is the C25 build artifact made browsable, runnable, and publishable.</h1><p class="lead">The dashboard now treats the Claude artifacts as first-class project material: product modules, investor docs, capital playbooks, deployment analysis, agent systems, and public HTML builds all live in one end-user operating view.</p><div class="cta"><a class="btn primary" href="#package">Publish / Package Path</a><a class="btn" href="#artifacts">Open Artifact Registry</a><a class="btn" href="#modules">Enter Modules</a></div></section><section class="section wrap"><div class="grid"><div class="card"><h3>11 modules</h3><p class="muted">Every service has a consumer page, subpages, and local port mapping.</p></div><div class="card"><h3>${artifacts.length} artifacts</h3><p class="muted">The known Claude artifact titles are compiled into a searchable registry.</p></div><div class="card"><h3>3 deployment lanes</h3><p class="muted">Termux local, GitHub Pages static, and future Termux package repository.</p></div></div></section>`}
function modulesPage(){return `<section class="section wrap"><h2>Module map</h2><p class="muted">Click a module to open its page, feature cards, and subpage routes.</p><div class="grid">${modules.map(moduleCard).join('')}</div></section>`}
function modulePage(id,sub){const m=modules.find(x=>x.id===id)||modules[0];if(sub)return `<section class="section wrap"><a class="btn" href="#module/${m.id}">← Back to ${m.name}</a><h2>${m.icon} ${decodeURIComponent(sub)}</h2><p class="lead">${decodeURIComponent(sub)} is an end-user route inside ${m.name}. It is ready for backend connection at localhost:${m.port} when the service API is wired.</p><div class="terminal">route=${m.id}/${decodeURIComponent(sub)}\nstatus=static-ready\nnext=connect live endpoint, auth, and data persistence</div></section>`;return `<section class="section wrap"><a class="btn" href="#modules">← All modules</a><h2>${m.icon} ${m.name}</h2><p class="lead">${m.desc}</p><div class="grid"><div class="card wide"><h3>Consumer promise</h3><p class="muted">A clear module doorway for testers and customers, with enough context to learn what the product does before backend services are connected.</p></div><div class="card"><h3>Local service</h3><p class="status">http://localhost:${m.port}</p></div>${['Overview','User Flow','API Status','Local Launch','Public Page','Investor Notes'].map(x=>`<div class="card"><h3>${x}</h3><p class="muted">${m.name} ${x.toLowerCase()} content.</p></div>`).join('')}</div><section class="section"><h2>Subpages</h2><div class="grid">${m.subs.map(s=>`<a class="card" href="#module/${m.id}/${encodeURIComponent(s)}"><h3>${s}</h3><p class="muted">Open ${s}.</p></a>`).join('')}</div></section></section>`}
function artifactsPage(){const cats=[...new Set(artifacts.map(a=>a.category))].sort();return `<section class="section wrap"><h2>Artifact registry</h2><p class="muted">These are the artifact names you provided, compiled into the platform so the project can track what exists and what still needs to be imported as files.</p><div class="grid"><div class="card full"><div class="cta">${cats.map(c=>`<a class="btn" href="#artifacts/${c}">${c}</a>`).join('')}</div></div>${artifacts.map(a=>`<div class="card"><span class="pill">${a.category} · ${a.edited}</span><h3>${a.title}</h3><p class="muted">Status: ${a.status}. Import path: add the artifact body under artifacts/${slug(a.title)}.</p></div>`).join('')}</div></section>`}
function artifactsCategory(cat){const list=artifacts.filter(a=>a.category===cat);return `<section class="section wrap"><a class="btn" href="#artifacts">← All artifacts</a><h2>${cat} artifacts</h2><div class="grid">${list.map(a=>`<div class="card"><span class="pill">${a.status}</span><h3>${a.title}</h3><p class="muted">Edited ${a.edited}. Ready to import into the repo-backed artifact body folder.</p></div>`).join('')}</div></section>`}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function signup(){return `<section class="section wrap"><h2>Sign up for local C25 testing</h2><form class="card wide" onsubmit="event.preventDefault();localStorage.c25User=JSON.stringify(Object.fromEntries(new FormData(this)));location.hash='dashboard'"><div class="field"><label>Name</label><input required name="name"></div><div class="field"><label>Email</label><input required name="email" type="email"></div><div class="field"><label>Primary interest</label><select name="interest">${modules.map(m=>`<option>${m.name}</option>`).join('')}</select></div><div class="field"><label>Tester type</label><select name="plan"><option>Free local tester</option><option>Capital partner review</option><option>Enterprise pilot</option></select></div><button class="primary">Create local profile</button></form></section>`}
function dashboard(){const user=localStorage.c25User?JSON.parse(localStorage.c25User):null;return `<section class="section wrap"><h2>Operator dashboard</h2><p class="muted">${user?`Local profile: ${user.name} / ${user.email} / ${user.interest}`:'No profile yet. Use Sign Up to create local demo context.'}</p><div class="grid"><div class="card wide"><h3>Boot report</h3><div class="terminal">✓ index.html loaded\n✓ ${modules.length} modules mapped\n✓ ${artifacts.length} artifacts registered\n✓ Termux server script present\n✓ GitHub Pages publish helper present\n→ Next: paste/import private artifact bodies into repo files</div></div><div class="card"><h3>Service ports</h3><p class="muted">${modules.map(m=>`${m.name}: ${m.port}`).join('<br>')}</p></div></div></section>`}
function packagePage(){return `<section class="section wrap"><h2>Publish and package path</h2><p class="lead">This replaces the missing “Claude publish button” with repo-owned commands you can run in Termux today.</p><div class="grid"><div class="card"><span class="pill">Local</span><h3>Run on Android</h3><div class="terminal">pkg install python git\nbash scripts/serve-c25.sh\n# open http://localhost:3000</div></div><div class="card"><span class="pill">Public</span><h3>Push to GitHub Pages</h3><div class="terminal">bash scripts/publish-github-pages.sh https://github.com/FacePrintPay/constellation25-mono.git</div></div><div class="card"><span class="pill">Next</span><h3>Import artifacts</h3><div class="terminal">bash scripts/scaffold-artifacts.sh\n# paste private artifact bodies into artifacts/*.md</div></div></div></section>`}
function investors(){return `<section class="section wrap"><h2>Investor view</h2><p class="lead">C25 is a local-first AI product constellation organized into consumer modules, capital materials, deployment tooling, and an artifact registry that can become a package-ready public platform.</p><table class="table"><tr><th>Signal</th><th>Compiled asset</th></tr><tr><td>Product breadth</td><td>11 module routes and subroutes</td></tr><tr><td>Capital readiness</td><td>Investor one-pagers, proposal, playbook, outreach strategy, tracking sheet</td></tr><tr><td>Distribution</td><td>Termux local server and GitHub Pages publish script</td></tr><tr><td>Next proof</td><td>Live backend health checks and imported artifact bodies</td></tr></table></section>`}
function render(){const parts=route().split('/');let html=parts[0]==='modules'?modulesPage():parts[0]==='module'?modulePage(parts[1],parts[2]):parts[0]==='artifacts'&&parts[1]?artifactsCategory(parts[1]):parts[0]==='artifacts'?artifactsPage():parts[0]==='signup'?signup():parts[0]==='dashboard'?dashboard():parts[0]==='package'?packagePage():parts[0]==='investors'?investors():home();$('#app').innerHTML=html;scrollTo(0,0)}
addEventListener('hashchange',render);render();
</script>
